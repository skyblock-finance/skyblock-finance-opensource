name: CI
on:
  - push
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6 # node is required by arethetypeswrong
        with:
          node-version: '24.x'
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run check
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run test
  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run turbo run start --filter=@skyblock-finance/schemas
