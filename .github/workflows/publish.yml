name: Publish Packages to NPM

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write # Required for OIDC (https://docs.npmjs.com/trusted-publishers#github-actions-configuration)

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install

      # update npm (presumably for OIDC support)
      - run: npm --version && npm install -g npm@11 && npm --version

      # make extra sure this publish wouldn’t break anything
      - run: bun run build check test

      - name: publish
        run: bun internals/scripts/source/publish.mts
